<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Diagnóstico Digital | LEVX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* TUS ESTILOS ORIGINALES (No se tocó nada) */
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .quiz-container { max-width: 600px; width: 90%; background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .option-btn { display: block; width: 100%; margin: 10px 0; padding: 12px; background: #334155; border: 1px solid #475569; color: white; cursor: pointer; border-radius: 8px; text-align: left; transition: 0.3s; font-size: 16px; }
        .option-btn:hover { background: #4f46e5; border-color: #6366f1; }
        .hidden { display: none; }
        .result-card { background: #1e293b; padding: 40px; border-radius: 16px; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="quiz-container" id="quiz-box">
        <div id="setup-step">
            <h1 style="text-align:center; color:#818cf8;">Diagnóstico Digital</h1>
            <p style="text-align:center; color:#94a3b8;">Completa tus datos para iniciar</p>
            <input type="text" id="client-name" placeholder="Tu nombre" style="width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #334155; background:#0f172a; color:white;">
            <input type="text" id="company-name" placeholder="Tu Empresa" style="width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #334155; background:#0f172a; color:white;">
            <button onclick="startQuiz()" class="option-btn" style="text-align:center; background:#4f46e5; margin-top:20px;">Comenzar Ahora</button>
        </div>

        <div id="quiz-step" class="hidden">
            <div id="progress-bar" style="height:8px; background:#334155; border-radius:4px; margin-bottom:20px;">
                <div id="progress-fill" style="height:100%; background:#4f46e5; width:0%; border-radius:4px; transition:0.3s;"></div>
            </div>
            <h2 id="question-text"></h2>
            <div id="options-container"></div>
        </div>

        <div id="result-step" class="hidden">
            <div id="report-content" class="result-card">
                <h2 style="color:#818cf8;">Tu Reporte LEVX</h2>
                <div id="score-display" style="font-size:48px; font-weight:bold; color:#4f46e5;"></div>
                <div id="recommendations"></div>
            </div>
            <button onclick="downloadPDF()" class="option-btn" style="background:#10b981; text-align:center; margin-top:20px;">Descargar Reporte PDF</button>
        </div>
    </div>

    <script>
        // TODA TU LÓGICA DE PREGUNTAS Y PUNTOS VA AQUÍ
        // Asegúrate de copiar tal cual las variables 'questions' y la función 'showQuestion'
        // que tenías en tu archivo original.
        
        function startQuiz() {
            const name = document.getElementById('client-name').value;
            if(!name) return alert("Por favor ingresa tu nombre");
            document.getElementById('setup-step').classList.add('hidden');
            document.getElementById('quiz-step').classList.remove('hidden');
            // Aquí llamas a tu función de mostrar pregunta
        }

        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const element = document.getElementById('report-content');
            const canvas = await html2canvas(element);
            const imgData = canvas.toDataURL('image/png');
            doc.addImage(imgData, 'PNG', 10, 10, 190, 0);
            doc.save('Reporte-Levx.pdf');
        }
    </script>
</body>
</html>
